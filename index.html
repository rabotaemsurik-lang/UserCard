<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="UserCard.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="UserCard">
      <header class="first-part">
        <h1>New York City, NY</h1>
      </header>
      <main class="content-part">
        <img class="photo" src="assets/ProfilePhoto.jpg" alt="Margot Robbie" />
        <h2 class="name">Margot Robbie</h2>
        <p class="explanation">
          Margot Robbie was born in Dalby, Queensland,<br />
          Australia and raised on the Gold Coast.
        </p>
        <button class="btn">Follow</button>
      </main>
      <footer class="last-part">
        <div class="stat-item">
          <i class="fa-regular fa-image"></i>
          <div class="stat-text">
            <span class="label">Posts</span>
            <span class="value">635</span>
          </div>
        </div>

        <div class="stat-item middle">
          <i class="fa-regular fa-heart"></i>
          <div class="stat-text">
            <span class="label">Favorites</span>
            <span class="value">3,472</span>
          </div>
        </div>

        <div class="stat-item">
          <i class="fa-regular fa-paper-plane"></i>
          <div class="stat-text">
            <span class="label">Messages</span>
            <span class="value">1,293</span>
          </div>
        </div>
      </footer>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="UserCard.css" />
  </head>
  <body>
    <div class="UserCard">
      <header class="first-part">
        <h1>New York City, NY</h1>
      </header>
      <main class="content-part">
        <img
          class="photo"
          src="https://www.menslife.com/upload/iblock/66d/8.jpg"
          alt="Margot Robbie"
        />
        <h2 class="name">Margot Robbie</h2>
        <p class="explanation">
          Margot Robbie was born in Dalby, Queensland,<br />
          Australia and raised on the Gold Coast.
        </p>
        <button class="btn">Follow</button>
      </main>
      <footer class="last-part">
        <div class="stat-item">
          <img
            src="https://static.vecteezy.com/system/resources/previews/066/336/402/non_2x/photo-frame-for-social-media-designs-post-template-framework-insert-your-picture-stock-illustration-free-vector.jpg"
            alt="Posts"
          />
          <div class="stat-text">
            <span class="label">Posts</span>
            <span class="value">635</span>
          </div>
        </div>
        <div class="stat-item">
          <img
            src="https://freepngimg.com/save/65414-button-computer-facebook-like-icons-free-clipart-hq/800x800"
            alt="Favorites"
          />
          <div class="stat-text">
            <span class="label">Favorites</span>
            <span class="value">3,472</span>
          </div>
        </div>
        <div class="stat-item">
          <img
            src="https://thumbs.dreamstime.com/b/empty-chat-message-frame-text-speech-bubble-isolated-white-background-329115510.jpg"
            alt="Messages"
          />
          <div class="stat-text">
            <span class="label">Messages</span>
            <span class="value">1,293</span>
          </div>
        </div>
      </footer>
    </div>
  </body>
</html>
